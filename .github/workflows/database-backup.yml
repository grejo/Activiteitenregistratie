name: Weekly Database Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Create database backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_BACKUP_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          BACKUP_FILE="activiteiten-xfactor_backup_${TIMESTAMP}.sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
          echo "Backup created: $BACKUP_FILE"

      - name: Upload to Azure Blob Storage
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING_BACKUP }}
        run: |
          which az || (curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash)
          az storage blob upload \
            --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
            --container-name db-backups \
            --name "$BACKUP_FILE" \
            --file "$BACKUP_FILE" \
            --overwrite
          echo "Uploaded: db-backups/$BACKUP_FILE"

      - name: Cleanup
        if: always()
        run: rm -f "$BACKUP_FILE"
