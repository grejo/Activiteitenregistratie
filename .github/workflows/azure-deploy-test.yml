name: Deploy to Azure App Service (Test)

on:
  push:
    branches:
      - Test
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: activiteiten-xfactor-test-app
  NODE_VERSION: '22.x'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Install production dependencies
        run: |
          rm -rf node_modules
          npm install --production

      - name: Prepare deployment package
        run: |
          set -e
          mkdir -p deployment
          cp -r .next deployment/.next
          cp -r node_modules deployment/node_modules
          cp server.js deployment/server.js
          cp package.json deployment/package.json
          cp package-lock.json deployment/package-lock.json
          cp -r public deployment/public
          cp web.config deployment/
          mkdir -p deployment/prisma
          cp prisma/schema.prisma deployment/prisma/
          cp -r prisma/migrations deployment/prisma/ 2>/dev/null || echo "No migrations to copy"
          cp prisma.config.ts deployment/prisma.config.ts 2>/dev/null || echo "No prisma.config.ts to copy"
          cp -r scripts deployment/scripts 2>/dev/null || echo "No scripts directory to copy"
          test -f deployment/server.js || (echo "ERROR: server.js missing" && exit 1)
          test -d deployment/.next || (echo "ERROR: .next missing" && exit 1)
          test -d deployment/node_modules/.prisma/client || (echo "ERROR: Prisma Client missing" && exit 1)

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app-test
          path: deployment
          include-hidden-files: true

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Test'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app-test

      - name: Verify downloaded artifact
        run: |
          test -d ".next" || (echo "ERROR: .next NOT found" && exit 1)
          echo "OK"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TEST }}
          package: .

      - name: Health check
        run: |
          sleep 30
          HEALTH_URL="https://activiteiten-xfactor-test-app.azurewebsites.net/api/health"
          response=$(curl -s -w "\n%{http_code}" "$HEALTH_URL" || echo "000")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -eq 200 ]; then echo "OK"; else echo "FAILED" && exit 1; fi

      - name: Log Deployment Summary
        if: always()
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "App: activiteiten-xfactor-test-app"
          echo "Branch: $BRANCH_NAME"
          echo "Commit: $COMMIT_SHA"
          echo "Time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
